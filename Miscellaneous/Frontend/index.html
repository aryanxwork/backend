<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GET and POST</title>
</head>

<body>
    <h2>GET REQUEST</h2>
    <form method="get" action="http:///localhost:8080/register">
        <input placeholder="Enter Name" name="user" type="text">
        <input placeholder="Enter Password" name="user" type="text">
        <button>Submit</button>
    </form>

    <H2>POST REQUEST</H2>
    <form method="post" action="http:///localhost:8080/register">
        <input placeholder="Enter Name" name="user" type="text">
        <input placeholder="Enter Password" name="user" type="text">
        <button>Submit</button>
    </form>
</body>

</html>
